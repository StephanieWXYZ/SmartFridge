name: Deploy SmartFridge to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/app/**"
      - "backend/Dockerfile"
      - "backend/pyproject.toml"
      - ".github/workflows/deploy.yml"

env:
  AWS_REGION: us-east-2
  ECR_WEB_REPO: smartfridge-web
  ECR_WORKER_REPO: smartfridge-worker
  ECS_CLUSTER: SmartFridge-Cluster
  ECS_WEB_SERVICE: smartfridge-web-service
  ECS_WORKER_SERVICE: smartfridge-worker-service

jobs:
  deploy:
    name: Build, push, and redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_WEB_REPO }}:latest -f backend/Dockerfile backend
          docker push $ECR_REGISTRY/${{ env.ECR_WEB_REPO }}:latest

      - name: Build and push worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_WORKER_REPO }}:latest -f backend/Dockerfile backend
          docker push $ECR_REGISTRY/${{ env.ECR_WORKER_REPO }}:latest

      - name: Redeploy web service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WEB_SERVICE }} \
            --force-new-deployment

      - name: Redeploy worker service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WORKER_SERVICE }} \
            --force-new-deployment
