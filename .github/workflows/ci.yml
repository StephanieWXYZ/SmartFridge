name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        working-directory: backend
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        working-directory: backend
        run: python -m ruff check .

      - name: Run tests
        working-directory: backend
        run: python -m pytest

  docker:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t smartfridge-backend -f backend/Dockerfile backend
